name: signal-desktop-cli

services:
  signal:
    platform: linux/amd64
    build:
      context: .
      target: signal-daemon
    environment:
      SIGNAL_API_HOST: 0.0.0.0
      SIGNAL_API_PORT: ${SIGNAL_API_PORT:-8080}
      SIGNAL_API_TOKEN: ${SIGNAL_API_TOKEN:-}
      SIGNAL_DAEMON_CONNECT: ${SIGNAL_DAEMON_CONNECT:-true}
      SIGNAL_DAEMON_LOG_LEVEL: ${SIGNAL_DAEMON_LOG_LEVEL:-info}
      SIGNAL_DAEMON_SHUTDOWN_TIMEOUT_MS: ${SIGNAL_DAEMON_SHUTDOWN_TIMEOUT_MS:-30000}
      SIGNAL_PROFILE_LOCK_PATH: /var/lib/signal-state/.signal-desktop-cli.lock
      SENTRY_DSN: ${SENTRY_DSN:-}
      SIGNAL_STORAGE_PATH: /var/lib/signal-state/profile
      SIGNAL_WEBHOOK_MAX_PENDING: ${SIGNAL_WEBHOOK_MAX_PENDING:-1000}
      SIGNAL_WEBHOOK_SECRET: ${SIGNAL_WEBHOOK_SECRET:-}
      SIGNAL_WEBHOOK_TIMEOUT_MS: ${SIGNAL_WEBHOOK_TIMEOUT_MS:-10000}
      SIGNAL_WEBHOOK_URL: ${SIGNAL_WEBHOOK_URL:-}
      TZ: ${TZ:-UTC}
    ports:
      - '127.0.0.1:${SIGNAL_API_PORT:-8080}:${SIGNAL_API_PORT:-8080}'
    cap_drop:
      - ALL
    mem_limit: ${SIGNAL_MEMORY_LIMIT:-768m}
    pids_limit: ${SIGNAL_PIDS_LIMIT:-128}
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 45s
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=10001,gid=10001,mode=1777
    volumes:
      - signal-data:/var/lib/signal-state
    healthcheck:
      test:
        [
          CMD-SHELL,
          'bash -c ''exec 3<>/dev/tcp/127.0.0.1/$${SIGNAL_API_PORT} && printf "GET /healthz HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && read -r _ status _ <&3 && test "$$status" = 200''',
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  signal-ui:
    profiles: [ui]
    platform: linux/amd64
    build:
      context: .
      target: signal-ui
    environment:
      SIGNAL_STORAGE_PATH: /var/lib/signal-state/profile
      SIGNAL_PROFILE_LOCK_PATH: /var/lib/signal-state/.signal-desktop-cli.lock
      SIGNAL_UI_DISABLE_GPU: ${SIGNAL_UI_DISABLE_GPU:-1}
      SIGNAL_UI_LISTEN_ADDRESS: 0.0.0.0
      SIGNAL_UI_PASSWORD: ${SIGNAL_UI_PASSWORD:-}
      SIGNAL_UI_PORT: ${SIGNAL_UI_PORT:-6080}
      SIGNAL_UI_RESOLUTION: ${SIGNAL_UI_RESOLUTION:-1440x900}
      TZ: ${TZ:-UTC}
    ports:
      - '127.0.0.1:${SIGNAL_UI_PORT:-6080}:${SIGNAL_UI_PORT:-6080}'
    cap_drop:
      - ALL
    cpus: ${SIGNAL_UI_CPU_LIMIT:-2.0}
    mem_limit: ${SIGNAL_UI_MEMORY_LIMIT:-2g}
    pids_limit: ${SIGNAL_UI_PIDS_LIMIT:-512}
    read_only: true
    security_opt:
      - no-new-privileges:true
    shm_size: 1gb
    stop_grace_period: 2m30s
    tmpfs:
      - /home/signal:rw,nosuid,nodev,size=256m,uid=10001,gid=10001,mode=0700
      - /tmp:rw,nosuid,nodev,size=256m,uid=10001,gid=10001,mode=1777
    volumes:
      - signal-data:/var/lib/signal-state
    healthcheck:
      test: [CMD-SHELL, "bash -c '</dev/tcp/127.0.0.1/$${SIGNAL_UI_PORT}'"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  state:
    profiles: [tools]
    platform: linux/amd64
    build:
      context: .
      target: signal-state
    environment:
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_PREFIX: ${R2_PREFIX:-signal-state}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      SIGNAL_PROFILE_LOCK_PATH: /var/lib/signal-state/.signal-desktop-cli.lock
      SIGNAL_STORAGE_PATH: /var/lib/signal-state/profile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: ${SIGNAL_STATE_CPU_LIMIT:-1.0}
    mem_limit: ${SIGNAL_STATE_MEMORY_LIMIT:-512m}
    pids_limit: ${SIGNAL_STATE_PIDS_LIMIT:-128}
    read_only: true
    tmpfs:
      - /home/signal:rw,noexec,nosuid,nodev,size=16m,uid=10001,gid=10001,mode=0700
      - /tmp:rw,noexec,nosuid,nodev,size=256m,uid=10001,gid=10001,mode=1777
    volumes:
      - signal-data:/var/lib/signal-state

volumes:
  signal-data:
    name: ${SIGNAL_DATA_VOLUME:-signal-desktop-data}
