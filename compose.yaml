name: signal-desktop-cli

services:
  signal-ui:
    profiles: [ui]
    platform: linux/amd64
    build:
      context: .
      target: signal-ui
      args:
        # Timestamp of the upstream Signal commit this fork is based on. Update
        # it when merging a newer upstream release; it controls build expiry.
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-1783615919}
    environment:
      SIGNAL_STORAGE_PATH: /var/lib/signal-state/profile
      SIGNAL_PROFILE_LOCK_PATH: /var/lib/signal-state/.signal-desktop-cli.lock
      SIGNAL_UI_DISABLE_GPU: ${SIGNAL_UI_DISABLE_GPU:-1}
      SIGNAL_UI_LISTEN_ADDRESS: 0.0.0.0
      SIGNAL_UI_PASSWORD: ${SIGNAL_UI_PASSWORD:-}
      SIGNAL_UI_PORT: ${SIGNAL_UI_PORT:-6080}
      SIGNAL_UI_RESOLUTION: ${SIGNAL_UI_RESOLUTION:-1440x900}
      TZ: ${TZ:-UTC}
    ports:
      - '127.0.0.1:${SIGNAL_UI_PORT:-6080}:${SIGNAL_UI_PORT:-6080}'
    security_opt:
      - no-new-privileges:true
    shm_size: 1gb
    stop_grace_period: 2m30s
    volumes:
      - signal-data:/var/lib/signal-state
    healthcheck:
      test: [CMD-SHELL, "bash -c '</dev/tcp/127.0.0.1/$${SIGNAL_UI_PORT}'"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  state:
    profiles: [tools]
    platform: linux/amd64
    build:
      context: .
      target: signal-state
      args:
        SIGNAL_BUILD_CREATED_AT: ${SIGNAL_BUILD_CREATED_AT:-2026-07-09T16:51:59Z}
        SIGNAL_GIT_REVISION: ${SIGNAL_GIT_REVISION:-a3661965bc6e240dadb851f5c57472b25c8aa189}
    environment:
      AGE_IDENTITY_FILE: ${AGE_IDENTITY_FILE:-/run/secrets/age-identity.txt}
      AGE_RECIPIENT: ${AGE_RECIPIENT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_PREFIX: ${R2_PREFIX:-signal-state}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      SIGNAL_PROFILE_LOCK_PATH: /var/lib/signal-state/.signal-desktop-cli.lock
      SIGNAL_STORAGE_PATH: /var/lib/signal-state/profile
    security_opt:
      - no-new-privileges:true
    volumes:
      - signal-data:/var/lib/signal-state
      - ./secrets:/run/secrets:ro

volumes:
  signal-data:
    name: ${SIGNAL_DATA_VOLUME:-signal-desktop-data}
