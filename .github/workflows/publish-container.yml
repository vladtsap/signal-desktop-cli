name: Publish container image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  publish:
    name: Test and publish daemon image
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    outputs:
      image: ${{ steps.publish.outputs.image }}
      image_name: ${{ steps.image.outputs.image_name }}
      latest_tag: ${{ steps.image.outputs.latest_tag }}
      commit_tag: ${{ steps.image.outputs.commit_tag }}
      digest: ${{ steps.publish.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Define image references
        id: image
        run: |
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "latest_tag=${IMAGE_NAME}:latest" >> "${GITHUB_OUTPUT}"
          echo "commit_tag=${IMAGE_NAME}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install test dependencies
        run: |
          sudo apt-get install --yes libpulse0 || {
            sudo apt-get update
            sudo apt-get install --yes libpulse0
          }
          pnpm install --frozen-lockfile

      - name: Generate test assets
        run: pnpm run generate

      - name: Run linters
        run: pnpm run lint

      - name: Run daemon tests
        run: pnpm run test-daemon

      - name: Run state-tool tests
        run: python3 -m unittest discover -s docker -p 'test_state_cli.py'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build daemon image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: signal-daemon
          platforms: linux/amd64
          load: true
          tags: |
            ${{ steps.image.outputs.latest_tag }}
            ${{ steps.image.outputs.commit_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test daemon image
        env:
          COMMIT_TAG: ${{ steps.image.outputs.commit_tag }}
        run: |
          test "$(docker image inspect --format '{{.Architecture}}' "${COMMIT_TAG}")" = amd64
          docker run --rm --entrypoint node "${COMMIT_TAG}" -e '
            const { existsSync } = require("node:fs");
            for (const path of [
              "/opt/signal-desktop/bundles/daemon.js",
              "/opt/signal-desktop/node_modules/@signalapp/libsignal-client",
              "/opt/signal-desktop/node_modules/@signalapp/sqlcipher",
            ]) {
              if (!existsSync(path)) {
                throw new Error(`Missing daemon runtime path: ${path}`);
              }
            }
          '

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tested daemon image
        id: publish
        env:
          COMMIT_TAG: ${{ steps.image.outputs.commit_tag }}
          LATEST_TAG: ${{ steps.image.outputs.latest_tag }}
        run: |
          docker push "${COMMIT_TAG}"
          docker push "${LATEST_TAG}"
          DIGEST="$(
            docker buildx imagetools inspect "${COMMIT_TAG}" --format '{{json .Manifest}}' |
              jq --raw-output '.digest'
          )"
          test "${DIGEST}" != null
          test -n "${DIGEST}"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "image=${IMAGE_NAME}@${DIGEST}" >> "${GITHUB_OUTPUT}"
          {
            echo '### Published daemon image'
            echo
            echo "- Immutable image: \`${IMAGE_NAME}@${DIGEST}\`"
            echo "- Commit tag: \`${COMMIT_TAG}\`"
            echo "- Latest tag: \`${LATEST_TAG}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
